services:
  openclaw-connector:
    build: .
    environment:
      UAG_GATEWAY_BASE_URL: "${UAG_GATEWAY_BASE_URL:-http://host.docker.internal:8080}"
      UAG_AGENT_ID: "${UAG_AGENT_ID:-agent_001}"
      UAG_AGENT_SK: "${UAG_AGENT_SK:-}"
      UAG_PROTOCOL_VERSION: "${UAG_PROTOCOL_VERSION:-uag.agent.v1}"
      UAG_CONNECT_RETRY_MIN_MS: "${UAG_CONNECT_RETRY_MIN_MS:-1000}"
      UAG_CONNECT_RETRY_MAX_MS: "${UAG_CONNECT_RETRY_MAX_MS:-30000}"
      UAG_HEARTBEAT_INTERVAL_SEC: "${UAG_HEARTBEAT_INTERVAL_SEC:-20}"
      UAG_ACK_DEADLINE_MS: "${UAG_ACK_DEADLINE_MS:-3000}"
      UAG_ACK_MAX_RETRIES: "${UAG_ACK_MAX_RETRIES:-2}"
      MOCK_MODE: "${MOCK_MODE:-happy}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
